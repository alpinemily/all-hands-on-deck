<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- tangerine body -->
  <circle cx="32" cy="35" r="24" fill="#FF8C00"/>
  <!-- subtle highlight -->
  <circle cx="24" cy="25" r="7" fill="#FFB347" opacity="0.45"/>
  <!-- segment lines -->
  <line x1="32" y1="12" x2="32" y2="58" stroke="#E07000" stroke-width="1.2" opacity="0.5"/>
  <line x1="9"  y1="29" x2="55" y2="41" stroke="#E07000" stroke-width="1.2" opacity="0.5"/>
  <line x1="9"  y1="41" x2="55" y2="29" stroke="#E07000" stroke-width="1.2" opacity="0.5"/>
  <!-- stem -->
  <rect x="30.5" y="5" width="3" height="8" rx="1.5" fill="#5A8A00"/>
  <!-- leaf -->
  <ellipse cx="37" cy="8" rx="6" ry="3" fill="#6AAF00" transform="rotate(-30 37 8)"/>
  <!-- han character -->
  <text x="32" y="44" font-size="26" text-anchor="middle" font-family="serif" fill="#fff" font-weight="bold">汉</text>
</svg>
